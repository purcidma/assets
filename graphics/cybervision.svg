<svg width="80" height="80" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Background circle -->
  <circle cx="40" cy="40" r="38" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>

  <!-- Shield shape — Cyber Vision Center is a security product -->
  <path d="M40 8 L62 18 L62 40 C62 54 52 65 40 70 C28 65 18 54 18 40 L18 18 Z"
        fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>

  <!-- Eye shape — "Vision" concept, industrial IoT monitoring -->
  <ellipse cx="40" cy="40" rx="13" ry="9" fill="none" stroke="#FFFFFF" stroke-width="1.8"/>
  <circle cx="40" cy="40" r="5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="40" cy="40" r="2.5" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.5"/>

  <!-- Network nodes — OT/IoT connectivity dots -->
  <circle cx="29" cy="22" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="51" cy="22" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="22" cy="36" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="58" cy="36" r="2" fill="#FFFFFF" opacity="0.7"/>

  <!-- Connecting lines from nodes to shield edge -->
  <line x1="30" y1="23" x2="35" y2="31" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="23" x2="45" y2="31" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="36" x2="30" y2="38" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="56" y1="36" x2="50" y2="38" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>

  <!-- Cisco-style signal arcs at the bottom of the shield -->
  <path d="M33 60 Q40 64 47 60" fill="none" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>
  <path d="M36 63 Q40 66 44 63" fill="none" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
</svg>
